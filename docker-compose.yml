version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mldock
      POSTGRES_PASSWORD: mldock_secret
      POSTGRES_DB: mldock
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mldock"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://mldock:mldock_secret@postgres:5432/mldock
      SECRET_KEY: mldock-production-secret-change-me
      STORAGE_PATH: /app/storage
    volumes:
      - model_storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  model_storage:
